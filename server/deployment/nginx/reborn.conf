# Cloudflare가 클라이언트-Cloudflare 구간의 https를 종료(terminate)하고 이 nginx에는
# 보통 http로 전달한다. Cloudflare가 이미 붙여준 X-Forwarded-Proto가 있으면 그대로 쓰고,
# (Cloudflare 없이 직접 접속하는 등) 없으면 nginx 자신이 본 스킴($scheme)으로 대체한다.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name www.reborn-energy.com reborn-energy.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # WebSocket 지원 (제어 명령용)
    location /ws/control {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
