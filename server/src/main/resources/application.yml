server:
  port: 8080
  # nginx/Cloudflare가 리버스 프록시하는 환경이라, X-Forwarded-Proto 등을 신뢰해야
  # springdoc(Swagger)이나 리다이렉트가 https를 올바르게 인식한다. 이게 없으면
  # 클라이언트는 https로 접속했는데 서버는 내부적으로 http로만 인식해서, Swagger UI가
  # http:// URL로 "Try it out" 요청을 보내다 브라우저의 mixed-content 차단에 걸릴 수 있음.
  forward-headers-strategy: framework

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000} # 1시간 (ms)
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:1209600000} # 14일 (ms)

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:} # 필수 설정 — 미설정 시 Google 로그인은 항상 실패 처리(fail-closed)

# SmartThings OAuth(#130) — PKCE 미지원으로 client_secret은 서버에만 보관.
# 미설정 시 SmartThingsAuthClient가 fail-closed로 501/500 처리한다.
smartthings:
  client-id: ${SMARTTHINGS_CLIENT_ID:}
  client-secret: ${SMARTTHINGS_CLIENT_SECRET:}
  redirect-uri: ${SMARTTHINGS_REDIRECT_URI:https://www.reborn-energy.com/api/smartthings/oauth/callback}
  authorize-url: https://api.smartthings.com/oauth/authorize
  token-url: https://api.smartthings.com/oauth/token
  api-base-url: https://api.smartthings.com/v1
  scope: "r:devices:* x:devices:*"
  # Arduino/공기계 미보유 장소용 온습도 폴링 주기(#133) — 기본 10분
  metric-poll-interval-ms: ${SMARTTHINGS_METRIC_POLL_INTERVAL_MS:600000}

# Gemini API(#142, AI 스피커 음성 피드백 분석/TTS). 미설정 시 GeminiClient가 fail-closed로 처리한다.
# 모델은 비용 최소화 목적으로 flash-lite 계열 사용(오디오 이해는 텍스트 대비 토큰 단가가 더 높음에 유의).
gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  tts-model: ${GEMINI_TTS_MODEL:gemini-2.5-flash-preview-tts}

# 판매용 기기(Arduino/AI 스피커) 시리얼 배치 발급(#147) 전용 운영자 키 — 장소/ADMIN과 무관하게
# 서비스 운영자만 호출 가능해야 하므로 정적 시크릿으로 인가한다. 미설정 시 fail-closed.
operator:
  api-key: ${OPERATOR_API_KEY:}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/reborn?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ReBornHikariCP
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000    # 30초: 커넥션 획득 대기 최대 시간
      idle-timeout: 600000         # 10분: 유휴 커넥션 유지 시간
      max-lifetime: 1800000        # 30분: 커넥션 최대 생존 시간 (DB wait_timeout 이하로 설정)
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: ${JPA_BATCH_FETCH_SIZE:100}
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:reborn-dev}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

fcm:
  service-account-key-base64: ${FCM_SERVICE_ACCOUNT_KEY_BASE64:} # 미설정 시 FCM 발송 비활성화(로컬 dev 편의)
