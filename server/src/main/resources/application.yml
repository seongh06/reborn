server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000} # 1시간 (ms)
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:1209600000} # 14일 (ms)

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:} # 미설정 시 aud 검증 생략 (dev 편의, 운영 배포 전 필수 설정)

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/reborn?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ReBornHikariCP
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000    # 30초: 커넥션 획득 대기 최대 시간
      idle-timeout: 600000         # 10분: 유휴 커넥션 유지 시간
      max-lifetime: 1800000        # 30분: 커넥션 최대 생존 시간 (DB wait_timeout 이하로 설정)
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: ${JPA_BATCH_FETCH_SIZE:100}
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:reborn-dev}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}
